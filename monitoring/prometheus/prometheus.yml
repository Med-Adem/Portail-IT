global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: app-server-node
    static_configs:
      - targets: ["192.168.56.10:9100"]
        labels:
          vm: app-server

  - job_name: app-server-cadvisor
    static_configs:
      - targets: ["192.168.56.10:8081"]
        labels:
          vm: app-server

  - job_name: app-server-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["192.168.56.10:8080"]
        labels:
          vm: app-server
          app: portal-backend

  - job_name: monitoring-server-node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          vm: monitoring-server

  - job_name: monitoring-server-cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          vm: monitoring-server

  - job_name: prometheus-self
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          vm: monitoring-server